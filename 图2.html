<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全辖区医院床位占用率综合监控大屏</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #030811;
            color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 大屏幕布局 */
        .dashboard-container {
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #08162b 0%, #030811 100%);
        }

        /* 头部大标题 */
        .header {
            height: 50px;
            width: 100%;
            position: relative;
            text-align: center;
            border-bottom: 1px solid rgba(0, 168, 255, 0.2);
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            color: #00f0ff;
            letter-spacing: 3px;
            line-height: 40px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }
        .header .sub-info {
            position: absolute;
            right: 10px;
            bottom: 12px;
            font-size: 13px;
            color: #617385;
        }

        /* 核心内容区 */
        .main-content {
            flex: 1;
            display: flex;
            gap: 24px;
        }

        /* 左侧全局综合统计指标 */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: rgba(7, 21, 46, 0.5);
            border: 1px solid #0f2d59;
            border-radius: 4px;
            padding: 18px;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 8px; height: 8px;
            border-top: 2px solid #00a8ff; border-left: 2px solid #00a8ff;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0; width: 8px; height: 8px;
            border-bottom: 2px solid #00a8ff; border-right: 2px solid #00a8ff;
        }
        .card-title {
            font-size: 14px;
            color: #748899;
            margin-bottom: 6px;
        }
        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #ff4d4d;
            font-family: 'Impact', sans-serif;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }
        .hospital-count {
            font-size: 20px;
            color: #00f0ff;
            margin-top: 4px;
        }

        /* 右侧主图表区 */
        .chart-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .legends {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        /* 混合图表容器 */
        .canvas-container {
            flex: 1;
            background: rgba(5, 14, 31, 0.75);
            border: 1px solid #0d2547;
            border-radius: 4px;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>辖区医院床位占用率对比监控大屏 (总览图)</h1>
        <div class="sub-info" id="currentTime">更新时间: --:--:--</div>
    </div>

    <div class="main-content">
        <div class="sidebar">
            <div class="card">
                <div class="card-title">监测医疗机构</div>
                <div class="hospital-count" id="hospitalCount">0 所医院并行</div>
            </div>
            <div class="card">
                <div class="card-title">全辖区当日实时平均占用率</div>
                <div class="card-value" id="globalAvgRate">0.0%</div>
            </div>
            <div class="card" style="flex: 1;">
                <div class="card-title" style="color: #00f0ff;">色彩升级说明</div>
                <p style="font-size: 13px; color: #617385; line-height: 1.8; margin-top: 10px;">
                    • <b style="color: #ff4d4d;">当日数据 (红)</b>：代表当下的核心聚焦指标。<br>
                    • <b style="color: #ffb703;">前1天 (黄)</b>、<b style="color: #06d6a0;">前2天 (绿)</b>、<b style="color: #118ab2;">前3天 (蓝)</b>：多色系拉开色差，横向跨期比对更加直观明显。<br>
                    • <b>动态追踪</b>：0.5秒/小时。柱状图直接刷新各医院4天在当前点的占用率落差；折线图同步延伸。
                </p>
            </div>
        </div>

        <div class="chart-area">
            <div class="chart-header">
                <h3 style="color: #00f0ff; font-size: 15px;" id="chartTitle">各医院整体占用率(柱状) 与 全域24H走向趋势(折线)</h3>
                <div class="legends">
                    <div class="legend-item"><div class="legend-color" style="background: #ff4d4d;"></div><span style="color:#ffffff; font-weight: bold;">当日数据</span></div>
                    <div class="legend-item"><div class="legend-color" style="background: #ffb703;"></div><span style="color:#a5b5c4">前1天</span></div>
                    <div class="legend-item"><div class="legend-color" style="background: #06d6a0;"></div><span style="color:#a5b5c4">前2天</span></div>
                    <div class="legend-item"><div class="legend-color" style="background: #118ab2;"></div><span style="color:#a5b5c4">前3天</span></div>
                </div>
            </div>
            <div class="canvas-container" id="canvasWrapper">
                <canvas id="mixedChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 纯医院维度数据集 ---
    const hospitals = [
        { name: "市第一人民医院", baseRate: 0.76 },
        { name: "市第二人民医院", baseRate: 0.58 },
        { name: "市第三人民医院", baseRate: 0.69 },
        { name: "市中医院", baseRate: 0.63 },
        { name: "市妇幼保健院", baseRate: 0.82 }
    ];

    document.getElementById('hospitalCount').innerText = hospitals.length + " 所医院全量并行";
    
    // 升级版：高辨识度极光色板
    const colors = {
        day0: '#ff4d4d', // 当日 (高亮红)
        day1: '#ffb703', // 前1天 (琥珀黄)
        day2: '#06d6a0', // 前2天 (翡翠绿)
        day3: '#118ab2'  // 前3天 (冰晶蓝)
    };

    let currentHour = 1; 
    let animationTimer = null;

    const canvas = document.getElementById('mixedChart');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');

    function resizeCanvas() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 生成数据
    function generateGlobalHospitalData() {
        let dataset = {
            day0: [], day1: [], day2: [], day3: [], 
            hospitalHistory: {} 
        };

        for(let h = 1; h <= 24; h++) {
            let wave = Math.sin(h / 3.5) * 0.11;
            dataset.day0.push(Math.min(0.95, Math.max(0.2, 0.70 + wave + (Math.random()*0.02 - 0.01))));
            dataset.day1.push(Math.min(0.95, Math.max(0.2, 0.66 + wave + (Math.random()*0.02 - 0.01))));
            dataset.day2.push(Math.min(0.95, Math.max(0.2, 0.73 + wave + (Math.random()*0.02 - 0.01))));
            dataset.day3.push(Math.min(0.95, Math.max(0.2, 0.62 + wave + (Math.random()*0.02 - 0.01))));
        }

        hospitals.forEach((hosp) => {
            dataset.hospitalHistory[hosp.name] = { day0: [], day1: [], day2: [], day3: [] };
            for(let h = 1; h <= 24; h++) {
                let hourlyTrend = Math.sin(h / 4) * 0.06;
                dataset.hospitalHistory[hosp.name].day0.push(Math.min(0.98, Math.max(0.1, hosp.baseRate + hourlyTrend + (Math.random()*0.03 - 0.015))));
                dataset.hospitalHistory[hosp.name].day1.push(Math.min(0.98, Math.max(0.1, hosp.baseRate * 0.94 + hourlyTrend + (Math.random()*0.03 - 0.015))));
                dataset.hospitalHistory[hosp.name].day2.push(Math.min(0.98, Math.max(0.1, hosp.baseRate * 1.04 + hourlyTrend + (Math.random()*0.03 - 0.015))));
                dataset.hospitalHistory[hosp.name].day3.push(Math.min(0.98, Math.max(0.1, hosp.baseRate * 0.88 + hourlyTrend + (Math.random()*0.03 - 0.015))));
            }
        });

        return dataset;
    }

    let globalDataMatrix = generateGlobalHospitalData();

    // --- 绘图引擎 ---
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const paddingLeft = 55;
        const paddingRight = 40;
        const paddingTop = 45;
        const paddingBottom = 50;
        
        const chartWidth = canvas.width - paddingLeft - paddingRight;
        const chartHeight = canvas.height - paddingTop - paddingBottom;

        // 1. Y 轴刻度线
        ctx.strokeStyle = "rgba(15, 45, 89, 0.3)";
        ctx.lineWidth = 1;
        ctx.fillStyle = "#5c6e7f";
        ctx.font = "11px sans-serif";
        ctx.textAlign = "right";

        for (let i = 0; i <= 5; i++) {
            let ratio = i / 5;
            let y = paddingTop + chartHeight * (1 - ratio);
            ctx.beginPath(); ctx.moveTo(paddingLeft, y); ctx.lineTo(paddingLeft + chartWidth, y); ctx.stroke();
            ctx.fillText((ratio * 100).toFixed(0) + "%", paddingLeft - 10, y + 4);
        }

        // 2. X 轴时间轴
        ctx.textAlign = "center";
        const xStep = chartWidth / 23; 
        for (let h = 1; h <= 24; h++) {
            let x = paddingLeft + (h - 1) * xStep;
            if (h === 1 || h === 24 || h % 3 === 1) {
                ctx.fillStyle = h <= currentHour ? "#00f0ff" : "#3b4b5a";
                ctx.fillText(h + "点", x, paddingTop + chartHeight + 20);
            }
            if (h === currentHour) { 
                ctx.strokeStyle = "rgba(0, 240, 255, 0.2)";
                ctx.beginPath(); ctx.moveTo(x, paddingTop); ctx.lineTo(x, paddingTop + chartHeight); ctx.stroke();
            }
        }

        // 3. 绘制：4柱复合并列柱状图（新颜色系统）
        const groupCount = hospitals.length;
        const groupWidth = chartWidth / groupCount;
        const barWidth = Math.min(15, groupWidth * 0.16); 
        const daysKeys = ['day0', 'day1', 'day2', 'day3'];

        hospitals.forEach((hosp, i) => {
            let groupCenterX = paddingLeft + (groupWidth * i) + (groupWidth / 2);
            let startX = groupCenterX - (barWidth * 4 + 3 * 3) / 2; 

            daysKeys.forEach((dayKey, dayIdx) => {
                let barX = startX + dayIdx * (barWidth + 3);
                let rateValue = globalDataMatrix.hospitalHistory[hosp.name][dayKey][currentHour - 1];
                let targetBarHeight = rateValue * chartHeight;
                let barY = paddingTop + chartHeight - targetBarHeight;

                ctx.fillStyle = colors[dayKey];
                // 适当给予少许透明度融合，让同台折线穿透感更好
                ctx.globalAlpha = dayKey === 'day0' ? 0.9 : 0.6; 
                ctx.fillRect(barX, barY, barWidth, targetBarHeight);
                ctx.globalAlpha = 1.0;

                // 在每根柱子上方精准输出当前数值（色彩和柱子对应）
                ctx.fillStyle = colors[dayKey];
                if(dayKey === 'day0') ctx.fillStyle = "#ffffff"; // 当日白字加亮
                ctx.font = "bold 10px sans-serif";
                ctx.fillText((rateValue * 100).toFixed(0), barX + barWidth/2, barY - 4);
            });

            // 医院名称标签
            ctx.fillStyle = "#ffffff";
            ctx.font = "13px sans-serif";
            ctx.fillText(hosp.name, groupCenterX, paddingTop + chartHeight + 38);
        });

        // 4. 绘制全域宏观走势折线图
        const lineConfigs = [
            { key: 'day3', color: colors.day3, width: 1.5, alpha: 0.6 },
            { key: 'day2', color: colors.day2, width: 1.5, alpha: 0.7 },
            { key: 'day1', color: colors.day1, width: 1.5, alpha: 0.8 },
            { key: 'day0', color: colors.day0, width: 3.0, alpha: 1.0 }  // 当日粗线强调
        ];

        lineConfigs.forEach(line => {
            ctx.strokeStyle = line.color;
            ctx.lineWidth = line.width;
            ctx.globalAlpha = line.alpha;
            ctx.beginPath();

            for (let h = 1; h <= currentHour; h++) {
                let val = globalDataMatrix[line.key][h - 1];
                let x = paddingLeft + (h - 1) * xStep;
                let y = paddingTop + chartHeight * (1 - val);

                if (h === 1) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // 实时终点焦点圈
            if (currentHour > 0) {
                let lastVal = globalDataMatrix[line.key][currentHour - 1];
                let lastX = paddingLeft + (currentHour - 1) * xStep;
                let lastY = paddingTop + chartHeight * (1 - lastVal);
                
                ctx.fillStyle = line.color;
                ctx.beginPath(); ctx.arc(lastX, lastY, line.width + 2, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        });
    }

    // --- 定时调度 (0.5秒步进) ---
    function updateDashboard() {
        let currentAvg = globalDataMatrix.day0[currentHour - 1];
        document.getElementById('globalAvgRate').innerText = (currentAvg * 100).toFixed(1) + "%";

        let now = new Date();
        document.getElementById('currentTime').innerText = "实时监测中 | 当前步进: " + currentHour + "点 | 刷新时间: " + now.toLocaleTimeString();
        document.getElementById('chartTitle').innerText = "各大医院病床负荷状态 (当前监测截面: " + currentHour + "点) 与 全域走势走向折线";

        render();

        if (currentHour < 24) {
            currentHour++;
        } else {
            currentHour = 1; 
        }
    }

    updateDashboard();
    animationTimer = setInterval(updateDashboard, 500);
</script>

</body>
</html>
